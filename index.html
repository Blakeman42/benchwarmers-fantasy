<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>League Hub | BUSH Power Rankings</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>League Hub</h1>
            <p>Official BUSH Power Rankings & Advanced Metrics</p>
        </div>
    </header>

    <main class="container">
        <section class="rankings-section">
            <h2>🏆 Power Rankings</h2>
            <div class="table-container">
                <table id="rankings-table">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Team</th>
                            <th>BUSH Score</th>
                            <th>Roster (AVG)</th>
                            <th>Perform (WRank)</th>
                            <th>Real Wins</th>
                            <th>Exp. Wins</th>
                            <th>All-Play %</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
